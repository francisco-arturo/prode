<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRODE Mundial 2026</title>
  <link rel="stylesheet" href="css/styles.css?v=3" />
</head>
<body>
  <!-- Publicidad al abrir la app (cada visita) -->
  <div id="ad-overlay" class="ad-overlay" aria-hidden="true">
    <div class="ad-box">
      <img src="img/ad.jpg" alt="Publicidad" class="ad-image" />
      <button type="button" id="ad-close" class="btn btn-primary ad-close">Continuar al PRODE</button>
    </div>
  </div>

  <!-- Modal PIN (admin) -->
  <div id="pin-overlay" class="pin-overlay" aria-hidden="true">
    <div class="pin-box">
      <h2 id="pin-title">Acceso admin</h2>
      <p id="pin-message" class="pin-message">Ingresá el PIN para continuar como Francisco.</p>
      <input type="password" id="pin-input" class="pin-input" inputmode="numeric" maxlength="8" autocomplete="off" />
      <p id="pin-error" class="pin-error" hidden>PIN incorrecto. Intentá de nuevo.</p>
      <div class="pin-actions">
        <button type="button" id="pin-cancel" class="btn btn-ghost">Cancelar</button>
        <button type="button" id="pin-confirm" class="btn btn-primary">Ingresar</button>
      </div>
    </div>
  </div>

  <!-- Pantalla 1: Bienvenida -->
  <section id="screen-welcome" class="screen active">
    <div class="welcome-card">
      <div class="welcome-emoji">⚽🏆</div>
      <h1>PRODE Mundial 2026</h1>
      <p class="subtitle">Pronosticá la fase de grupos y todas las eliminatorias.</p>
      <form id="welcome-form" autocomplete="off">
        <label for="player-name">Tu nombre</label>
        <input type="text" id="player-name" placeholder="Ej: Francisco" maxlength="40" required />
        <button type="submit" class="btn btn-primary">Comenzar</button>
      </form>
    </div>
  </section>

  <!-- Pantalla 2: Pronósticos -->
  <section id="screen-main" class="screen">
    <header class="app-header">
      <div class="app-header-inner">
        <div class="player-info">
          <span class="player-label">Jugador</span>
          <strong id="player-display"></strong>
        </div>
        <div class="header-actions">
          <button id="btn-save" class="btn btn-primary">Guardar</button>
          <button id="btn-leaderboard" class="btn btn-secondary">Puntos</button>
          <button id="btn-participants" class="btn btn-secondary">Participantes</button>
          <button id="btn-admin" class="btn btn-admin" hidden>Resultados</button>
          <button id="btn-reset" class="btn btn-ghost">Reiniciar</button>
        </div>
      </div>
      <div id="save-feedback" class="save-feedback" aria-live="polite"></div>
    </header>

    <main class="content">
      <section class="phase">
        <h2 class="phase-title">Fase de Grupos</h2>
        <div id="groups-container" class="groups-grid"></div>
      </section>

      <section class="phase">
        <h2 class="phase-title">Fase Eliminatoria</h2>
        <div id="knockout-notice" class="notice"></div>
        <div id="knockout-container" class="knockout-rounds"></div>
      </section>
    </main>
  </section>

  <!-- Overlay: lista de participantes y visor de pronósticos ajenos -->
  <div id="viewer-overlay" class="overlay" aria-hidden="true">
    <div class="overlay-box">
      <div class="overlay-header">
        <button id="viewer-back" class="btn btn-ghost overlay-back" hidden>← Volver</button>
        <h2 id="viewer-title">Participantes</h2>
        <button id="viewer-close" class="overlay-close" aria-label="Cerrar">×</button>
      </div>
      <div id="viewer-body" class="overlay-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js?v=3"></script>
  <script src="js/data.js?v=3"></script>
  <script src="js/annex-c.js?v=3"></script>
  <script src="js/bracket.js?v=3"></script>
  <script src="js/scoring.js?v=3"></script>
  <script src="js/storage.js?v=3"></script>
  <script src="js/cloud.js?v=3"></script>
  <script src="js/app.js?v=3"></script>
  <script src="js/viewer.js?v=3"></script>
  <script src="js/admin.js?v=3"></script>
</body>
</html>
